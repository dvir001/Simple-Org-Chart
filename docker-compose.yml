services:
  simple-org-chart:
    image: ghcr.io/dvir001/db-auto-org-chart:latest
    container_name: simple-org-chart
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:${APP_PORT:-5000}"
    environment:
      - FLASK_ENV=production
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./repositories:/app/repositories
