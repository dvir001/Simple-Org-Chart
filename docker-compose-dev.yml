services:
  simple-org-chart_dev:
    build: .
    container_name: simple-org-chart-dev
    restart: unless-stopped
    ports:
      - "5002:${APP_PORT:-5000}"
    environment:
      - FLASK_ENV=production
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./repositories:/app/repositories
